# Default values for simple-vault
# This is a YAML-formatted file.

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# API Service Configuration
api:
  enabled: true
  image:
    repository: 188.132.232.168:30836/simple-vault-api
    tag: 25
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  livenessProbe: {}
  
  readinessProbe: {}
  
  # Environment variables
  env:
    PORT: "8080"
    # MongoDB configuration - use MONGODB_URI or individual components
    MONGODB_URI: "mongodb://root:jPRoAlzMyY@mongodb.default.svc:27017/"  # If set, this takes precedence (e.g., "mongodb://root:secret123@mongodb.default.svc:27017/")
    DB_HOST: ""
    DB_PORT: ""
    DB_USER: ""
    DB_PASSWORD: ""
    DB_NAME: "vault"
    # Auth service URL
    AUTH_SERVICE_URL: "http://auth-authservice:8083"
    VAULT_MASTER_KEY: "Ntebem/GkBd2EY+smMVkDHeAlP4xsPMzJApDMzYBjpI="
  
  # Node selector, tolerations, and affinity
  nodeSelector: {}
  tolerations: []
  affinity: {}

# MongoDB Configuration (optional - use external MongoDB if enabled: false)
mongodb:
  enabled: false
  image:
    repository: mongo
    tag: "7"
    pullPolicy: IfNotPresent
  
  auth:
    enabled: true
    rootUsername: vault
    rootPassword: vault
    database: vault
  
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  service:
    type: ClusterIP
    port: 27017

# Ingress Configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: vault.bugx.ir
      paths:
        - path: /
          pathType: Prefix
  tls: 
   - secretName: simple-vault-tls
     hosts: 
       - vault.bugx.ir

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Security Context (container-level)
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  # Note: fsGroup belongs in podSecurityContext, not here

# Pod Security Context (pod-level)
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000


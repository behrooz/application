{{- if .Values.buildJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vclusterfront.fullname" . }}-build
  labels:
    {{- include "vclusterfront.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "vclusterfront.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
      - name: build
        image: docker:latest
        command:
        - sh
        - -c
        - |
          apk add --no-cache docker-cli
          docker build \
            --build-arg VITE_API_BASE_URL={{ .Values.apiConfig.baseUrl | quote }} \
            --build-arg VITE_VAULT_API_URL={{ .Values.apiConfig.vaultApiUrl | quote }} \
            -t {{ .Values.image.repository }}:{{ .Values.image.tag }} \
            .
          docker push {{ .Values.image.repository }}:{{ .Values.image.tag }}
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
{{- end }}


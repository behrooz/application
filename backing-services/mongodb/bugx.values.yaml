# Bugx overrides — use Bitnami Legacy images (bitnami/* is no longer published)
global:
  imageRegistry: docker.io

image:
  registry: docker.io
  repository: bitnamilegacy/mongodb
  tag: 8.0.3-debian-12-r0

metrics:
  enabled: false
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb-exporter
    tag: 0.41.2-debian-12-r1

tls:
  image:
    registry: docker.io
    repository: bitnamilegacy/nginx
    tag: 1.27.2-debian-12-r2

volumePermissions:
  enabled: false
  image:
    registry: docker.io
    repository: bitnamilegacy/os-shell
    tag: 12-debian-12-r32

externalAccess:
  autoDiscovery:
    image:
      registry: docker.io
      repository: bitnamilegacy/kubectl
      tag: 1.31.2-debian-12-r3

auth:
  enabled: true
  rootUser: root
  rootPassword: "secret123"

serviceAccount:
  create: false

service:
  type: NodePort

resources:
  requests:
    cpu: 1000m
    memory: 1G
  limits:
    cpu: 1000m
    memory: 1G

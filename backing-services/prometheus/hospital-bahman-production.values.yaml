alertmanager:
  enabled: false
  image:
    registry: 172.16.16.1:30516
    repository: bitnami/alertmanager
    tag: 0.26.0-debian-11-r45
    digest: ""

server:
  image:
    registry: 172.16.16.1:30516
    repository: bitnami/prometheus
    tag: 2.48.1-debian-11-r0
  service:    
    type: NodePort
  configuration: |
    global:
      scrape_interval: 15s  # Set the scrape interval to every 15 seconds
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'node_exporters'
        static_configs:
          - targets:
              - '45.159.150.146:9100'
              - '45.149.78.193:9100'